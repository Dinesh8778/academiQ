databases:
  - name: college_ai_db
    plan: free

services:
  - type: web
    name: college_ai_web
    plan: free
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn college_ai.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: college_ai_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
