{% extends "base.html" %}
{% block title %}Edit Subject{% endblock %}
{% block page_title %}Edit Subject{% endblock %}
{% block nav_subjects %}active{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Code</label>
            <input type="text" name="code" class="form-control" value="{{ subj.code }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Name</label>
            <input type="text" name="name" class="form-control" value="{{ subj.name }}" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Department</label>
            <select name="department" class="form-select" required>
              {% for d in departments %}
              <option value="{{ d.pk }}" {% if subj.department_id == d.pk %}selected{% endif %}>
                {{ d.code }} - {{ d.name }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary fw-semibold">
              <i class="bi bi-save me-1"></i>Save
            </button>
            <a href="{% url 'subject_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
