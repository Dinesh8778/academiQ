{% extends "base.html" %}
{% block title %}Edit Marks Record{% endblock %}
{% block page_title %}Edit Marks Record{% endblock %}
{% block nav_marks %}active{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h5 class="card-title mb-4">Student: {{ mark.student.name }} ({{ mark.student.regno }})</h5>
        
        <form method="post">
          {% csrf_token %}
          
          <div class="mb-3">
            <label class="form-label fw-semibold">Subject <span class="text-danger">*</span></label>
            <select name="subject" class="form-select" required>
              <option value="">— Select Subject —</option>
              {% for s in subjects %}
              <option value="{{ s.pk }}"
                {% if form_data.subject %}
                  {% if form_data.subject == s.pk|stringformat:"s" %}selected{% endif %}
                {% else %}
                  {% if mark.subject_id == s.pk %}selected{% endif %}
                {% endif %}>
                {{ s.code }} - {{ s.name }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Exam Type <span class="text-danger">*</span></label>
            <select name="exam_type" class="form-select" required>
              <option value="">— Select Exam Type —</option>
              {% for code, label in exam_types %}
              <option value="{{ code }}"
                {% if form_data.exam_type %}
                  {% if form_data.exam_type == code %}selected{% endif %}
                {% else %}
                  {% if mark.exam_type == code %}selected{% endif %}
                {% endif %}>
                {{ label }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Date <span class="text-danger">*</span></label>
            <input type="date" name="date" class="form-control"
                   value="{% if form_data.date %}{{ form_data.date }}{% else %}{{ mark.date|date:'Y-m-d' }}{% endif %}" required>
          </div>

          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label fw-semibold">Marks Obtained <span class="text-danger">*</span></label>
              <input type="number" name="marks_obtained" class="form-control" step="0.01" min="0"
                     value="{% if form_data.marks_obtained %}{{ form_data.marks_obtained }}{% else %}{{ mark.marks_obtained }}{% endif %}" required>
            </div>
            
            <div class="col-6 mb-3">
              <label class="form-label fw-semibold">Max Marks <span class="text-danger">*</span></label>
              <input type="number" name="max_marks" class="form-control" step="0.01" min="0.01"
                     value="{% if form_data.max_marks %}{{ form_data.max_marks }}{% else %}{{ mark.max_marks }}{% endif %}" required>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary fw-semibold">
              <i class="bi bi-save me-1"></i>Save Changes
            </button>
            <a href="{% url 'marks_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
