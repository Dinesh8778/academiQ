{% extends "base.html" %}
{% block title %}Reset Email Sent{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 text-center">
    <i class="bi bi-envelope-check-fill text-success" style="font-size:3rem;"></i>
    <h5 class="mt-3 fw-bold">Check Your Email</h5>
    <p class="text-muted">
      If an account with that email exists, a password reset link has been sent.
      Check your inbox and spam folder.
    </p>
    <a href="{% url 'login' %}" class="btn btn-outline-primary">Back to Login</a>
  </div>
</div>
{% endblock %}
