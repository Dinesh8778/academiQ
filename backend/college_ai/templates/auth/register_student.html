{% extends "base.html" %}
{% block title %}Register Student{% endblock %}
{% block page_title %}Register Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
              <input type="text" name="username" class="form-control"
                     value="{{ form_data.username|default:'' }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Register Number <span class="text-danger">*</span></label>
              <input type="text" name="regno" class="form-control"
                     value="{{ form_data.regno|default:'' }}" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control"
                     value="{{ form_data.name|default:'' }}" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" name="email" class="form-control"
                     value="{{ form_data.email|default:'' }}">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Class <span class="text-danger">*</span></label>
              <select name="student_class" class="form-select" required>
                <option value="">— Select Class —</option>
                {% for cls in classes %}
                <option value="{{ cls.pk }}"
                  {% if form_data.student_class == cls.pk|stringformat:"s" %}selected{% endif %}>
                  {{ cls }}
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
              <input type="password" name="password2" class="form-control" required>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success fw-semibold">
              <i class="bi bi-person-plus me-1"></i>Register Student
            </button>
            <a href="{% url 'login' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
