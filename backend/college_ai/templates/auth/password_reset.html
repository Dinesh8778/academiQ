{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height:80vh;align-items:center;">
  <div class="col-sm-10 col-md-5 col-lg-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-1">Reset Password</h5>
        <p class="text-muted small mb-3">Enter your email — we'll send a reset link.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
        </form>
        <div class="text-center mt-3">
          <a href="{% url 'login' %}" class="small text-decoration-none">Back to login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
