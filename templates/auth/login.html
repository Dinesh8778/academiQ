{% extends "base.html" %}
{% block title %}Login — AcademiQ{% endblock %}
{% block content %}
<div class="row justify-content-center" style="min-height:100vh;align-items:center;">
  <div class="col-sm-10 col-md-6 col-lg-4 py-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-mortarboard-fill text-primary" style="font-size:2.5rem;"></i>
          <h4 class="mt-2 fw-bold">AcademiQ</h4>
          <p class="text-muted small">AI Student Management System</p>
        </div>
        <form method="post" action="{% url 'login' %}">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control"
                   value="{{ username|default:'' }}" autofocus required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
        </form>
        <hr class="my-3">
        <div class="text-center small">
          <a href="/auth/password-reset/">Forgot password?</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
