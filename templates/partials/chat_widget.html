{# Floating chat widget — include in any dashboard template #}
{# Usage: {% include "partials/chat_widget.html" %} #}

<!-- Chat Toggle Button -->
<button id="chatToggle"
        style="position:fixed;bottom:24px;right:24px;z-index:1050;
               width:52px;height:52px;border-radius:50%;border:none;
               background:#0d6efd;color:#fff;font-size:1.4rem;
               box-shadow:0 4px 12px rgba(0,0,0,.25);cursor:pointer;"
        title="AcademiQ Assistant">
  <i class="bi bi-chat-dots-fill"></i>
</button>

<!-- Chat Window -->
<div id="chatWindow"
     style="display:none;position:fixed;bottom:88px;right:24px;z-index:1049;
            width:360px;max-height:520px;display:none;flex-direction:column;
            background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);
            overflow:hidden;font-size:.9rem;">

  <!-- Header -->
  <div style="background:#0d6efd;color:#fff;padding:.75rem 1rem;
              display:flex;justify-content:space-between;align-items:center;">
    <span><i class="bi bi-robot me-2"></i><strong>AcademiQ Assistant</strong></span>
    <button onclick="document.getElementById('chatWindow').style.display='none'"
            style="background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <!-- Messages area -->
  <div id="chatMessages"
       style="flex:1;overflow-y:auto;padding:1rem;
              background:#f8f9fa;min-height:240px;max-height:360px;">
    <div class="text-muted small text-center py-3">
      Ask me about your attendance, grades, assignments, or class data.
    </div>
  </div>

  <!-- Input area -->
  <div style="border-top:1px solid #dee2e6;padding:.6rem .75rem;
              display:flex;gap:.5rem;background:#fff;">
    <input id="chatInput" type="text" class="form-control form-control-sm"
           placeholder="Type a message..." maxlength="2000"
           style="border-radius:20px;">
    <button id="chatSend" class="btn btn-primary btn-sm" style="border-radius:20px;white-space:nowrap;">
      <i class="bi bi-send-fill"></i>
    </button>
  </div>
</div>

<script>
(function() {
  // -----------------------------------------------------------------------
  // Get CSRF token from cookie (for session auth fallback)
  // -----------------------------------------------------------------------
  function getCookie(name) {
    let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? decodeURIComponent(v[2]) : null;
  }

  const toggleBtn   = document.getElementById('chatToggle');
  const chatWindow  = document.getElementById('chatWindow');
  const messagesDiv = document.getElementById('chatMessages');
  const inputEl     = document.getElementById('chatInput');
  const sendBtn     = document.getElementById('chatSend');
  let history = [];

  // Toggle visibility
  toggleBtn.addEventListener('click', function() {
    const visible = chatWindow.style.display === 'flex';
    chatWindow.style.display = visible ? 'none' : 'flex';
    chatWindow.style.flexDirection = 'column';
    if (!visible) inputEl.focus();
  });

  // Append a message bubble
  function appendMessage(role, text) {
    const isUser = role === 'user';
    const div = document.createElement('div');
    div.style.cssText = [
      'display:flex',
      isUser ? 'justify-content:flex-end' : 'justify-content:flex-start',
      'margin-bottom:.5rem',
    ].join(';');
    const bubble = document.createElement('div');
    bubble.style.cssText = [
      'max-width:80%',
      'padding:.5rem .75rem',
      'border-radius:12px',
      isUser ? 'background:#0d6efd;color:#fff' : 'background:#fff;border:1px solid #dee2e6',
      'white-space:pre-wrap',
      'word-break:break-word',
      'font-size:.85rem',
    ].join(';');
    bubble.textContent = text;
    div.appendChild(bubble);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // Show typing indicator
  function showTyping() {
    const div = document.createElement('div');
    div.id = 'typingIndicator';
    div.style.cssText = 'display:flex;justify-content:flex-start;margin-bottom:.5rem;';
    div.innerHTML = '<div style="background:#fff;border:1px solid #dee2e6;border-radius:12px;' +
                    'padding:.4rem .75rem;font-size:.8rem;color:#6c757d;">Thinking...</div>';
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  // Send message
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    sendBtn.disabled = true;

    appendMessage('user', text);
    showTyping();

    try {
      const resp = await fetch('/api/assistant/ask/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken'),
        },
        body: JSON.stringify({ message: text, history: history }),
      });

      removeTyping();

      if (resp.status === 429) {
        appendMessage('assistant', '⚠️ Rate limit reached. Please wait a moment.');
        sendBtn.disabled = false;
        return;
      }
      if (resp.status === 401 || resp.status === 403) {
        appendMessage('assistant', '🔒 Authentication required. Please log in.');
        sendBtn.disabled = false;
        return;
      }

      const data = await resp.json();
      const answer = data.answer || 'No response received.';
      appendMessage('assistant', answer);

      if (data.draft_data) {
        appendDraftPreview(data.draft_data);
      }

      // Keep history for context (last 6 turns = 3 exchanges)
      history.push({ role: 'user', content: text });
      history.push({ role: 'assistant', content: answer });
      if (history.length > 12) history = history.slice(-12);

    } catch (err) {
      removeTyping();
      appendMessage('assistant', '❌ Network error. Please try again.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function appendDraftPreview(draft) {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;justify-content:flex-start;margin-bottom:.5rem;width:100%;';
    const bubble = document.createElement('div');
    bubble.style.cssText = [
      'width:100%',
      'padding:.75rem',
      'border-radius:12px',
      'background:#fffefe',
      'border:2px dashed #ffc107',
      'font-size:.85rem',
      'box-shadow:0 2px 8px rgba(0,0,0,0.05)'
    ].join(';');

    let previewContent = '';
    if (draft.action_type === 'low_attendance_notice') {
      previewContent = `
        <div class="fw-bold text-warning mb-1"><i class="bi bi-file-earmark-text-fill"></i> Proposed Low Attendance Draft</div>
        <div class="mb-2 p-2 bg-light rounded text-dark border small" style="font-family:monospace;white-space:pre-wrap;"><strong>Subject:</strong> ${draft.title}\n\n${draft.message}</div>
      `;
    } else if (draft.action_type === 'weekly_summary_report') {
      previewContent = `
        <div class="fw-bold text-primary mb-1"><i class="bi bi-file-earmark-text-fill"></i> Proposed Weekly Summary Draft</div>
        <div class="mb-2 p-2 bg-light rounded text-dark border small" style="font-family:monospace;white-space:pre-wrap;"><strong>Subject:</strong> ${draft.title}\n\n${draft.message}</div>
      `;
    }

    bubble.innerHTML = `
      ${previewContent}
      <div class="d-flex gap-2 justify-content-end mt-2">
        <button class="btn btn-sm btn-success py-1 px-2 fw-semibold btn-confirm-draft" data-draft-id="${draft.draft_id}">
          <i class="bi bi-check-circle-fill"></i> Confirm and Send
        </button>
        <button class="btn btn-sm btn-outline-danger py-1 px-2 btn-discard-draft" data-draft-id="${draft.draft_id}">
          <i class="bi bi-x-circle"></i> Discard
        </button>
      </div>
    `;

    // Hook up button events
    const confirmBtn = bubble.querySelector('.btn-confirm-draft');
    const discardBtn = bubble.querySelector('.btn-discard-draft');

    confirmBtn.addEventListener('click', async function() {
      confirmBtn.disabled = true;
      discardBtn.disabled = true;
      try {
        const res = await fetch('/api/notifications/send-draft/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify({ draft_id: draft.draft_id, action: 'confirm' })
        });
        const resData = await res.json();
        if (res.ok) {
          bubble.innerHTML = `<div class="text-success"><i class="bi bi-check-circle-fill"></i> Confirmed & Sent successfully!</div>`;
        } else {
          bubble.innerHTML = `<div class="text-danger">❌ Error confirming: ${resData.detail || 'Request failed'}</div>`;
        }
      } catch (err) {
        bubble.innerHTML = `<div class="text-danger">❌ Network Error.</div>`;
      }
    });

    discardBtn.addEventListener('click', async function() {
      confirmBtn.disabled = true;
      discardBtn.disabled = true;
      try {
        const res = await fetch('/api/notifications/send-draft/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify({ draft_id: draft.draft_id, action: 'discard' })
        });
        if (res.ok) {
          bubble.innerHTML = `<div class="text-secondary"><i class="bi bi-trash-fill"></i> Draft discarded.</div>`;
        } else {
          bubble.innerHTML = `<div class="text-danger">❌ Error discarding.</div>`;
        }
      } catch (err) {
        bubble.innerHTML = `<div class="text-danger">❌ Network Error.</div>`;
      }
    });

    div.appendChild(bubble);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
})();
</script>
