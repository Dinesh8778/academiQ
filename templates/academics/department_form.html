{% extends "base.html" %}
{% block title %}Edit Department{% endblock %}
{% block page_title %}Edit Department{% endblock %}
{% block nav_depts %}active{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Code <span class="text-danger">*</span></label>
            <input type="text" name="code" class="form-control" value="{{ dept.code }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ dept.name }}" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">HOD</label>
            <select name="hod" class="form-select">
              <option value="">— None —</option>
              {% for t in teachers %}
              <option value="{{ t.pk }}" {% if dept.hod_id == t.pk %}selected{% endif %}>
                {{ t.user.get_full_name|default:t.user.username }} ({{ t.teacher_id }})
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary fw-semibold">
              <i class="bi bi-save me-1"></i>Save
            </button>
            <a href="{% url 'department_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
